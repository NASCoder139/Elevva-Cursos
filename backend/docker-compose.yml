services:
  postgres:
    image: postgres:16
    container_name: miaccess-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: miaccess
      POSTGRES_PASSWORD: miaccess123
      POSTGRES_DB: miaccess
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miaccess -d miaccess"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
